  /* ───────── 설정값은 <script> 안 CONFIG 에서 바꿉니다 ───────── */
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    color-scheme: light;
    --paper:#f4ecdb; --card:#fbf6ec; --ink:#322b21; --soft:#7c6e58;
    --line:#ddcdac; --clay:#a8543a; --gold:#b8893f;
    --serif:'GBsub','Gowun Batang',serif; --script:'NPSsub','Nanum Pen Script',cursive;
  }
  body{
    font-family:'Gowun Dodum',sans-serif; color:var(--ink); word-break:keep-all;
    min-height:100vh; padding:26px 14px 60px;
    background:
      radial-gradient(circle at 18% 0%, #faf3e3 0%, transparent 55%),
      radial-gradient(circle at 92% 8%, #f6ecd6 0%, transparent 50%),
      linear-gradient(180deg,#f4ecdb,#ece0c6);
  }
  .wrap{max-width:1000px;margin:0 auto;}
  .eyebrow{letter-spacing:.42em;font-size:10.5px;color:var(--clay);text-transform:uppercase;font-weight:700;margin-bottom:8px;text-align:center;}
  .title{font-family:var(--serif);font-weight:700;font-size:clamp(26px,7vw,44px);text-align:center;line-height:1.18;}
  .sub{text-align:center;color:var(--soft);margin:12px auto 2px;font-size:13.5px;line-height:1.7;max-width:420px;}
  .sub b{color:var(--clay);}
  .verse{text-align:center;font-family:var(--script);color:var(--clay);font-size:clamp(24px,6vw,34px);margin:14px 0 24px;line-height:1.2;}
  .rules{max-width:560px;margin:0 auto 30px;background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:15px;padding:16px 20px;}
  .rule{display:flex;gap:7px;margin:0 0 9px;font-size:12.5px;line-height:1.7;color:#5a4f3d;}
  .rule:last-child{margin-bottom:0;}
  .rules b{color:var(--clay);}
  .rules .n{color:var(--gold);font-weight:700;font-family:var(--serif);flex:0 0 auto;}
  .rules .t{flex:1;}
  .week{margin-bottom:30px;}
  .wtitle{display:flex;align-items:center;gap:11px;margin:0 2px 12px;}
  .wtitle h2{font-family:var(--serif);font-size:19px;font-weight:700;}
  .wtitle .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}
  .grid{display:grid;grid-template-columns:30px repeat(5,1fr);gap:5px;}
  .dhead{background:linear-gradient(160deg,#473b29,#2f2619);color:#f4ecd9;border-radius:10px;padding:7px 2px;text-align:center;box-shadow:0 3px 11px rgba(60,45,20,.16);overflow:hidden;}
  .dhead .num{font-family:var(--serif);font-size:18px;font-weight:700;line-height:1;}
  .dhead .wd{font-size:9.5px;opacity:.68;margin-top:2px;}
  .dhead .mo{font-size:8.5px;opacity:.5;}
  .rowlab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10.5px;color:var(--soft);font-weight:700;line-height:1.15;}
  .rd{width:8px;height:8px;border-radius:50%;}
  .cell{position:relative;background:var(--card);border:1px solid var(--line);border-radius:10px;min-height:60px;padding:7px 4px 6px;cursor:pointer;width:100%;
    transition:transform .15s ease, box-shadow .2s ease, border-color .2s ease;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:1px;
    font-family:inherit;color:inherit;text-align:center;}
  .cell:active{transform:scale(.97);}
  .cell:hover{box-shadow:0 7px 16px rgba(80,60,25,.13);border-color:var(--gold);}
  .cell .name{font-size:12.5px;font-weight:700;line-height:1.3;}
  .cell .empty{font-size:10.5px;color:#c2b594;margin-top:4px;}
  .cell .topic{margin-top:4px;font-size:9.5px;color:var(--soft);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .cdot{position:absolute;top:5px;right:5px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;}
  .footer{display:flex;flex-direction:column;align-items:center;gap:9px;margin-top:8px;}
  .tip{text-align:center;color:var(--soft);font-size:11.5px;line-height:1.5;}
  .sync{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:999px;padding:7px 15px;font-family:inherit;font-size:12px;color:#5a4f3d;cursor:pointer;}
  .status{font-size:11px;color:var(--soft);}
  .status b{color:var(--clay);}

  .back{position:fixed;inset:0;background:rgba(40,30,15,.46);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;}
  .back.on{display:flex;animation:fade .2s ease;}
  .modal{background:var(--card);border-radius:20px;width:100%;max-width:430px;overflow:hidden;box-shadow:0 24px 60px rgba(40,28,10,.4);animation:pop .26s cubic-bezier(.2,.9,.3,1.2);border:1px solid var(--line);}
  .mhead{padding:20px 22px 16px;color:#f5eddb;position:relative;}
  .mhead .when{font-family:var(--serif);font-size:23px;font-weight:700;}
  .mhead .slot{font-size:13px;opacity:.9;margin-top:3px;}
  .close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.18);border:none;width:32px;height:32px;border-radius:50%;color:#fff;cursor:pointer;font-size:18px;line-height:1;}
  .mbody{padding:20px 22px 22px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--soft);margin-bottom:7px;}
  .inp,.area{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font-family:inherit;font-size:14px;color:var(--ink);background:#fffdf8;outline:none;transition:border-color .15s;}
  .inp:focus,.area:focus{border-color:var(--clay);}
  .area{resize:vertical;min-height:120px;line-height:1.65;}
  .save{width:100%;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:15px;font-weight:700;color:#fff;cursor:pointer;
    background:linear-gradient(135deg,#a8543a,#8c3f2c);box-shadow:0 6px 16px rgba(140,63,44,.3);}
  .save:active{transform:scale(.98);}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style>
</head>

const WD = ["일","월","화","수","목","금","토"];
const wdOf = d => WD[new Date(d.y, d.m, d.d).getDay()];
const DAYS = {}; WEEKS.forEach(w => w.days.forEach(d => DAYS[d.id] = d));
const splitNames = s => (s||"").split(/[,，]/).map(x=>x.trim()).filter(Boolean);
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function buildDefault(){
  const m = {};
  WEEKS.forEach(w => w.days.forEach(d => SLOTS.forEach(s => {
    m[d.id+":"+s.key] = { name: d.names[s.key]||"", prayer:"" };
  })));
  return m;
}

/* 이름표 내용에서 버전을 자동으로 만듭니다.
   이름을 하나라도 고치면 이 값이 저절로 바뀌어,
   누가 열든 최신 이름으로 한 번 자동 교정됩니다. (숫자를 직접 만질 필요 없음) */
function nameSignature(){
  const def = buildDefault();
  let str = "";
  Object.keys(def).sort().forEach(id => { str += id + "=" + def[id].name + "|"; });
  let h = 0;
  for(let i=0; i<str.length; i++){ h = (h*31 + str.charCodeAt(i)) | 0; }
  return "v" + (h >>> 0);
}
const SEED_VERSION = nameSignature();

let state = { data: buildDefault(), activeId: null };

/* ---------- 저장소 (공유: 구글 시트 / 로컬) ---------- */

// 읽기: JSONP (CORS 영향 없이 안전하게 읽어옴)
function jsonpGet(url){
  return new Promise((resolve, reject) => {
    const cb = "__cb_" + Math.random().toString(36).slice(2);
    const sep = url.indexOf("?") >= 0 ? "&" : "?";
    const s = document.createElement("script");
    const timer = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 12000);
    function cleanup(){ try{ delete window[cb]; }catch(e){} s.remove(); clearTimeout(timer); }
    window[cb] = (data) => { cleanup(); resolve(data || {}); };
    s.onerror = () => { cleanup(); reject(new Error("network")); };
    s.src = url + sep + "callback=" + cb + "&t=" + Date.now();
    document.body.appendChild(s);
  });
}

async function fetchData(){
  if(!shared()){
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
    catch(e){ return {}; }
  }
  return await jsonpGet(CONFIG.API_URL);
}

// 전체 덮어쓰기 (이름표 교정용)
async function putData(obj){
  if(!shared()){
    localStorage.setItem(LS_KEY, JSON.stringify(obj));
    return;
  }
  await fetch(CONFIG.API_URL, {
    method:"POST", mode:"no-cors",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({ full: obj })
  });
}

// 한 칸만 갱신 (서버가 합쳐주므로 동시 수정에도 안전)
async function patchData(id, name, prayer){
  if(!shared()) return;   // 로컬 모드는 putData 경로를 씀
  await fetch(CONFIG.API_URL, {
    method:"POST", mode:"no-cors",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({ patch:{ id, name, prayer }, v: SEED_VERSION })
  });
}

/* ---------- 그리기 ---------- */
function buildGrid(){
  const html = WEEKS.map(week => `
    <section class="week">
      <div class="wtitle"><h2>${week.title}</h2><span class="ln"></span></div>
      <div class="grid">
        <div></div>
        ${week.days.map(d => `
          <div class="dhead"><div class="mo">${d.m===5?"6월":"7월"}</div><div class="num">${d.d}</div><div class="wd">${wdOf(d)}</div></div>
        `).join("")}
        ${SLOTS.map(s => `
          <div class="rowlab"><span class="rd" style="background:${s.color}"></span>${s.label}</div>
          ${week.days.map(d => `<button class="cell" data-id="${d.id}:${s.key}" data-slot="${s.key}"></button>`).join("")}
        `).join("")}
      </div>
    </section>
  `).join("");
  document.getElementById("weeks").innerHTML = html;
}

function renderCells(){
  document.querySelectorAll(".cell").forEach(btn => {
    const id = btn.dataset.id;
    const c = state.data[id] || {};
    const color = slotMeta(btn.dataset.slot).color;
    const names = splitNames(c.name);
    const has = !!c.prayer;
    btn.style.background = has ? `linear-gradient(160deg,#fffaf0,${color}14)` : "";
    btn.innerHTML =
      (has ? `<span class="cdot" style="background:${color}">✓</span>` : "") +
      (names.length ? names.map(n => `<span class="name">${esc(n)}</span>`).join("")
                    : `<span class="empty">＋ 추가</span>`) +
      (has ? `<span class="topic">🙏 ${esc(c.prayer)}</span>` : "");
  });
}

function setStatus(txt){ document.getElementById("status").innerHTML = txt; }

/* 저장본을 최신 이름표와 맞춥니다.
   버전이 다르면(이름이 바뀌었으면) 이름은 최신값으로 되돌리고,
   기존 기도제목(prayer)은 살려둡니다. */
function reconcile(remote){
  if(!remote || remote.__v !== SEED_VERSION){
    const m = buildDefault();
    if(remote){
      Object.keys(m).forEach(id => {
        if(remote[id] && remote[id].prayer) m[id].prayer = remote[id].prayer;
      });
    }
    m.__v = SEED_VERSION;
    return { obj:m, changed:true };
  }
  const obj = Object.assign(buildDefault(), remote);
  obj.__v = SEED_VERSION;
  return { obj, changed:false };
}

async function sync(){
  try {
    const remote = await fetchData();
    const { obj, changed } = reconcile(remote);
    if(changed) await putData(obj);   // 저장소를 최신 이름으로 한 번 교정
    state.data = obj;
    renderCells();
    setStatus(shared() ? "모두와 공유 중 · 동기화 완료" : "이 기기에만 저장됨 (공유 설정 안 됨)");
  } catch(e){
    setStatus("동기화 실패 — 잠시 후 다시 시도하세요");
  }
}

/* ---------- 모달 ---------- */
function openModal(id){
  state.activeId = id;
  const [dayId, slotKey] = id.split(":");
  const day = DAYS[dayId], s = slotMeta(slotKey), c = state.data[id] || {};
  document.getElementById("mWhen").innerHTML =
    `${day.m===5?"6월":"7월"} ${day.d}일 <span style="font-size:15px;opacity:.8">(${wdOf(day)})</span>`;
  document.getElementById("mSlot").textContent = s.label + " 기도 당번";
  document.getElementById("mhead").style.background = `linear-gradient(135deg, ${s.color}, #2f2619)`;
  document.getElementById("mName").value = c.name || "";
  document.getElementById("mPrayer").value = c.prayer || "";
  document.getElementById("back").classList.add("on");
}
function closeModal(){ document.getElementById("back").classList.remove("on"); state.activeId = null; }

async function saveCell(){
  const id = state.activeId;
  if(!id) return;
  const name = document.getElementById("mName").value.trim();
  const prayer = document.getElementById("mPrayer").value.trim();
  const btn = document.getElementById("saveBtn");
  btn.textContent = "저장 중…";
  try {
    if(shared()){
      // 서버(시트)가 해당 칸만 합쳐서 저장 → 동시 수정에도 안전
      await patchData(id, name, prayer);
      state.data[id] = { name, prayer };
      renderCells();
    } else {
      const remote = await fetchData();
      const { obj } = reconcile(remote);
      obj[id] = { name, prayer };
      await putData(obj);
      state.data = obj;
      renderCells();
    }
    btn.textContent = "✓ 저장됐어요";
    setTimeout(() => { closeModal(); btn.textContent = "저장하기"; }, 600);
  } catch(e){
    btn.textContent = "저장 실패 — 다시 시도";
    setTimeout(() => btn.textContent = "저장하기", 1500);
  }
}

/* ---------- 이벤트 ---------- */
buildGrid();
renderCells();
sync();

document.getElementById("weeks").addEventListener("click", e => {
  const btn = e.target.closest(".cell");
  if(btn) openModal(btn.dataset.id);
});
document.getElementById("closeBtn").addEventListener("click", closeModal);
document.getElementById("back").addEventListener("click", e => { if(e.target.id === "back") closeModal(); });
document.getElementById("saveBtn").addEventListener("click", saveCell);
document.getElementById("syncBtn").addEventListener("click", sync);
document.addEventListener("visibilitychange", () => { if(!document.hidden) sync(); });
</script>
